name: Booster

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  boost-install:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20, 21, 22, 23, 24, 25]

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Clean and Install
        run: |
          npm cache clean --force
          npm install stickers-formatter mediaforge gspeak api-qasim --no-save


name: Faster

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:

jobs:
  boost-install:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
        node-version: [18, 20, 21, 22, 23, 24, 25]

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}

      - name: Clean and Install
        shell: bash
        run: |
          npm cache clean --force
          npm install api-qasim stickers-formatter mediaforge gspeak --no-save


